<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',sans-serif}
body{display:flex;height:100vh;overflow:hidden;background:#f0f4f8}
#sidebar{width:300px;min-width:300px;background:#1e293b;color:#eee;display:flex;flex-direction:column;overflow:hidden;border-right:2px solid #334155}
#sidebar h1{background:#0f172a;padding:14px 16px;font-size:14px;letter-spacing:1px;color:#f87171;text-transform:uppercase}
.section{padding:12px 14px;border-bottom:1px solid #334155}
.section h3{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#f87171;margin-bottom:8px}
input,select{width:100%;padding:7px 10px;background:#0f172a;border:1px solid #334155;border-radius:6px;color:#eee;font-size:13px;margin-bottom:6px}
input::placeholder{color:#64748b}
button{width:100%;padding:8px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s}
.btn-primary{background:#e94560;color:#fff}
.btn-primary:hover{background:#c73652}
.btn-secondary{background:#1e3a5f;color:#eee;border:1px solid #334155}
.btn-secondary:hover{background:#2a4a7f}
#fare-result{background:#0f172a;border-radius:6px;padding:8px 10px;font-size:13px;color:#4ade80;min-height:32px;margin-top:4px;line-height:1.6}
#attractions-list{flex:1;overflow-y:auto;padding:10px 14px}
#attractions-list h3{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#f87171;margin-bottom:8px}
.attraction-item{background:#0f172a;border-radius:6px;padding:8px 10px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;font-size:13px;cursor:pointer;border:1px solid transparent;transition:.2s}
.attraction-item:hover{border-color:#e94560}
.attraction-item .del{color:#f87171;cursor:pointer;font-size:18px;line-height:1;padding:0 4px}
.status{font-size:12px;color:#94a3b8;font-style:italic;margin-top:4px}
#map{flex:1;z-index:1}
.info-popup{font-size:13px;min-width:160px}
.info-popup h4{color:#e94560;margin-bottom:4px;font-size:14px}
.info-popup .badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;color:#fff;margin:2px 2px 4px 0}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:#0f172a}
::-webkit-scrollbar-thumb{background:#e94560;border-radius:3px}
</style>
</head>
<body>

<div id="sidebar">
  <h1>🚇 Singapore MRT Map</h1>

  <div class="section">
    <h3>Add Attraction</h3>
    <input id="attraction-input" type="text" placeholder="e.g. Gardens by the Bay"/>
    <button class="btn-primary" onclick="addAttraction()">📍 Add to Map</button>
    <div id="add-status" class="status"></div>
  </div>

  <div class="section">
    <h3>Fare Calculator</h3>
    <select id="from-station"><option value="">From station...</option></select>
    <select id="to-station"><option value="">To station...</option></select>
    <button class="btn-secondary" onclick="calcFare()">Calculate Fare</button>
    <div id="fare-result">Select stations to calculate fare.</div>
  </div>

  <div id="attractions-list">
    <h3>My Attractions</h3>
    <div id="attractions-items"><p style="font-size:12px;color:#64748b">No attractions added yet.</p></div>
  </div>
</div>

}));

  line.stations.forEach(s=>{

    const icon=L.divIcon({
      html:`<div style="width:${isIx?13:9}px;height:${isIx?13:9}px;background:${line.color};border:${isIx?'2.5px':'2px'} solid #fff;border-radius:50%;box-shadow:0 1px 3px rgba(0,0,0,.35)"></div>`,

    });
    const sl=stationMap[s.name]?.lines||[line.id];
    const badges=sl.map(lid=>{const l=LINES.find(x=>x.id===lid);return l?`<span class="badge" style="background:${l.color}">${l.abbr}</span>`:''}).join('');
    const lineNames=sl.map(lid=>LINES.find(l=>l.id===lid)?.name||lid).join(', ');
    L.marker([s.lat,s.lng],{icon}).addTo(map)

  });
});

// ── FARE CALCULATOR ───────────────────────────────────────────────────────────
function haversine(la1,lo1,la2,lo2){
  const R=6371,dL=(la2-la1)*Math.PI/180,dO=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dL/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dO/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function calcFare(){
  const from=document.getElementById('from-station').value;
  const to=document.getElementById('to-station').value;
  const res=document.getElementById('fare-result');
  if(!from||!to){res.textContent='Please select both stations.';return;}
  if(from===to){res.textContent='Same station selected.';return;}
  const s1=stationMap[from],s2=stationMap[to];
  const dist=haversine(s1.lat,s1.lng,s2.lat,s2.lng);
  const tiers=[3.2,4.2,5.2,6.2,7.2,8.2,9.2,10.2,11.2,12.2,13.2,14.2,15.2,16.2,17.2,18.2,19.2,20.2,21.2,22.2,23.2,24.2,25.2,26.2,27.2,28.2];
  const fares=[0.92,0.99,1.06,1.13,1.19,1.26,1.33,1.40,1.47,1.54,1.60,1.67,1.74,1.81,1.87,1.94,2.01,2.08,2.15,2.21,2.28,2.35,2.42,2.49,2.55,2.62];
  let fare=2.62;
  for(let i=0;i<tiers.length;i++){if(dist<=tiers[i]){fare=fares[i];break;}}
  res.innerHTML=`<b>${from}</b> → <b>${to}</b><br/>~${dist.toFixed(1)} km &nbsp;|&nbsp; Adult EZ-Link: <b>S$${fare.toFixed(2)}</b>`;
}

async function addAttraction(){
  const input=document.getElementById('attraction-input');
  const status=document.getElementById('add-status');
  const name=input.value.trim();
  if(!name) return;
  status.textContent='🔍 Searching...';
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(name+' Singapore')}&format=json&limit=1`,{headers:{'Accept-Language':'en'}});
    const d=await r.json();
    if(!d.length){status.textContent=`❌ "${name}" not found. Try a different name.`;return;}
    const {lat,lon,display_name}=d[0];
    const latF=parseFloat(lat),lngF=parseFloat(lon);
    const shortAddr=display_name.split(',').slice(0,3).join(', ');
    const id=Date.now();
    const icon=L.divIcon({html:`<div style="font-size:22px;line-height:1;filter:drop-shadow(0 1px 2px rgba(0,0,0,.4))">📍</div>`,className:'',iconAnchor:[11,22]});
    const marker=L.marker([latF,lngF],{icon}).addTo(map)
      .bindPopup(`<div class="info-popup"><h4>📍 ${name}</h4><small>${shortAddr}</small></div>`)
      .openPopup();
    map.setView([latF,lngF],15);
    attractions.push({id,name,lat:latF,lng:lngF});
    attractionMarkers[id]=marker;
    renderAttractionsList();
    input.value='';
    status.textContent='';
  }catch(e){status.textContent='❌ Error finding location. Try again.';}
}

// Allow Enter key to add attraction
document.getElementById('attraction-input').addEventListener('keydown',e=>{if(e.key==='Enter') addAttraction();});

function removeAttraction(id){
  const idx=attractions.findIndex(a=>a.id===id);
  if(idx>-1){map.removeLayer(attractionMarkers[id]);delete attractionMarkers[id];attractions.splice(idx,1);renderAttractionsList();}
}

function renderAttractionsList(){
  const c=document.getElementById('attractions-items');
  if(!attractions.length){c.innerHTML='<p style="font-size:12px;color:#64748b">No attractions added yet.</p>';return;}
  c.innerHTML=attractions.map(a=>`
    <div class="attraction-item" onclick="flyTo(${a.lat},${a.lng},${a.id})">
      <span>📍 ${a.name}</span>
      <span class="del" onclick="event.stopPropagation();removeAttraction(${a.id})">×</span>
    </div>`).join('');
}

function flyTo(lat,lng,id){map.setView([lat,lng],16);attractionMarkers[id]?.openPopup();}
</script>
</body>
</html>
